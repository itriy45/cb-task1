        ],
        images: []
      },
      {
        id: 30,
        title: "Отримання сертифіката",
        description: [
          "Заповніть форму для отримання сертифіката про завершення курсу."
        ],
        videos: [],
        links: [
          "https://forms.gle/hsok8T4wki7xGgNj9",
          "https://t.me/irynakorol"
        ],
        images: []
      }
    ];

    let activeLessonId = courseData.find(l => !l.isModule)?.id || 1;
    let isSidebarOpen = false;
    let currentVideoIndex = 0;

    const getEmbedUrl = (url) => {
      if (!url) return null;
      const ytMatch = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i);
      if (ytMatch && ytMatch[1]) return `https://www.youtube.com/embed/${ytMatch[1]}?rel=0`;
      return url;
    };
    
    // Перевірка на mp4 покращена для обробки URL з параметрами
    const isMp4 = (url) => url && url.toLowerCase().includes('.mp4');
    
    const getDomain = (url) => { 
      try { 
        return new URL(url).hostname.replace('www.', ''); 
      } catch(e) { 
        return "Посилання"; 
      } 
    };

    function toggleSidebar() {
      isSidebarOpen = !isSidebarOpen;
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      const menuIcon = document.getElementById('mobile-menu-icon');
      if (isSidebarOpen) {
        sidebar.classList.remove('-translate-x-full');
        overlay.classList.remove('hidden');
        menuIcon.setAttribute('data-lucide', 'x');
      } else {
        sidebar.classList.add('-translate-x-full');
        overlay.classList.add('hidden');
        menuIcon.setAttribute('data-lucide', 'menu');
      }
      lucide.createIcons();
    }

    function selectLesson(id) { 
      activeLessonId = id; 
      currentVideoIndex = 0; 
      if (isSidebarOpen) toggleSidebar(); 
      renderApp(); 
      document.getElementById('main-scroll-area').scrollTop = 0;
    }
    
    function selectVideo(index) { 
      currentVideoIndex = index; 
      renderApp(); 
    }
    
    function goPrev() { 
      const currentIndex = courseData.findIndex(l => l.id === activeLessonId); 
      // Знаходимо попередній урок (не модуль)
      for(let i = currentIndex - 1; i >= 0; i--) {
        if (!courseData[i].isModule) {
          selectLesson(courseData[i].id);
          break;
        }
      }
    }
    
    function goNext() { 
      const currentIndex = courseData.findIndex(l => l.id === activeLessonId); 
      // Знаходимо наступний урок (не модуль)
      for(let i = currentIndex + 1; i < courseData.length; i++) {
        if (!courseData[i].isModule) {
          selectLesson(courseData[i].id);
          break;
        }
      }
    }

    function renderSidebar() {
      const navContainer = document.getElementById('sidebar-nav');
      let html = '';
      courseData.forEach(item => {
        if (item.isModule) {
          html += `<div class="mt-6 mb-2 first:mt-2"><h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider px-3">${item.title}</h3></div>`;
        } else {
          const isActive = activeLessonId === item.id;
          const bgClass = isActive ? 'bg-blue-50 text-blue-700 shadow-sm border-blue-100' : 'text-gray-600 hover:bg-gray-100 hover:text-gray-900 border-transparent';
          const icon = isActive ? 'play-circle' : 'check-circle-2';
          const iconClass = isActive ? 'text-blue-600' : 'text-gray-300';
          html += `<button onclick="selectLesson(${item.id})" class="w-full text-left flex items-start gap-3 px-3 py-3 rounded-xl transition-all border ${bgClass}">
              <div class="mt-0.5 shrink-0"><i data-lucide="${icon}" class="w-[18px] h-[18px] ${iconClass}"></i></div>
              <span class="text-sm font-medium leading-snug">${item.title}</span>
            </button>`;
        }
      });
      navContainer.innerHTML = html;
    }

    function renderContent() {
      const contentContainer = document.getElementById('main-content');
      const activeLesson = courseData.find(l => l.id === activeLessonId);
      const currentIndex = courseData.findIndex(l => l.id === activeLessonId);
      if (!activeLesson) return;

      let html = `<div class="flex items-center text-sm text-gray-500 mb-6 font-medium"><span>Програма</span><i data-lucide="chevron-right" class="w-4 h-4 mx-2"></i><span class="text-gray-900 truncate">Розділ ${activeLesson.id}</span></div>
        <h1 class="text-2xl md:text-4xl font-extrabold text-gray-900 mb-6 leading-tight">${activeLesson.title}</h1>`;

      // Відеоплеєр
      if (activeLesson.videos && activeLesson.videos.length > 0) {
        const currentVideo = activeLesson.videos[currentVideoIndex];
        html += `<div class="mb-8"><div class="aspect-video bg-black rounded-2xl overflow-hidden shadow-lg border border-gray-200 relative">`;
        if (isMp4(currentVideo)) {
          html += `<video controls class="w-full h-full object-contain" src="${currentVideo}" controlsList="nodownload">Ваш браузер не підтримує відео.</video>`;
        } else {
          html += `<iframe class="w-full h-full absolute top-0 left-0" src="${getEmbedUrl(currentVideo)}" title="Video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
        }
        html += `</div>`;
        
        // Перемикач частин відео (якщо їх більше 1)
        if (activeLesson.videos.length > 1) {
          html += `<div class="mt-4 p-4 bg-white rounded-xl shadow-sm border border-gray-200"><h4 class="text-sm font-bold text-gray-700 mb-3 flex items-center gap-2"><i data-lucide="play-circle" class="w-4 h-4"></i> Частини уроку (${activeLesson.videos.length})</h4><div class="flex flex-wrap gap-2">`;
          activeLesson.videos.forEach((_, idx) => {
            const btnClass = currentVideoIndex === idx ? 'bg-blue-600 text-white border-blue-600' : 'bg-gray-50 text-gray-600 hover:bg-gray-100 border-gray-200';
            html += `<button onclick="selectVideo(${idx})" class="px-4 py-2 text-sm font-semibold rounded-lg transition-colors border ${btnClass}">Частина ${idx + 1}</button>`;
          });
          html += `</div></div>`;
        }
        html += `</div>`;
      } else {
        html += `<div class="aspect-video bg-gray-100 rounded-2xl flex flex-col items-center justify-center text-gray-400 mb-8 border-2 border-dashed border-gray-200"><i data-lucide="play" class="w-12 h-12 mb-4 opacity-30"></i><p class="font-medium">Відеоматеріали відсутні для цього розділу</p></div>`;
      }

      html += `<div class="grid grid-cols-1 lg:grid-cols-3 gap-8"><div class="lg:col-span-2 space-y-8">
        <section class="bg-white rounded-2xl p-6 shadow-sm border border-gray-200"><h2 class="text-lg font-bold text-gray-900 mb-4 flex items-center gap-2"><i data-lucide="book-open" class="w-5 h-5 text-blue-500"></i> Інформація по уроку:</h2>`;
      
      // Опис / Тези
      if (activeLesson.description && activeLesson.description.length > 0) {
        html += `<ul class="space-y-3">`;
        activeLesson.description.forEach((item, idx) => {
          html += `<li class="flex items-start text-gray-700 leading-relaxed"><span class="h-6 w-6 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center shrink-0 mr-3 mt-0.5 text-xs font-bold">${idx + 1}</span>${item}</li>`;
        });
        html += `</ul>`;
      } else {
        html += `<p class="text-gray-500 italic">Опис відсутній.</p>`;
      }
      html += `</section></div><div class="space-y-6">`;
      
      let hasMaterials = false;
      
      // Посилання / Документи
      if (activeLesson.links && activeLesson.links.length > 0) {
        hasMaterials = true;
        html += `<div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-200"><h3 class="font-bold text-gray-900 mb-4 flex items-center gap-2"><i data-lucide="file-text" class="w-4 h-4 text-blue-500"></i> Корисні посилання</h3><div class="space-y-3">`;
        activeLesson.links.forEach((link) => {
          html += `<a href="${link}" target="_blank" rel="noopener noreferrer" class="group flex items-start gap-3 p-3 rounded-xl hover:bg-blue-50 border border-gray-100 hover:border-blue-100 transition-all"><div class="bg-gray-100 p-2 rounded-lg group-hover:bg-blue-100 group-hover:text-blue-600 transition-colors"><i data-lucide="link" class="w-4 h-4"></i></div><div class="overflow-hidden"><p class="text-sm font-semibold text-gray-800 group-hover:text-blue-700 truncate">${getDomain(link)}</p><p class="text-xs text-gray-500 truncate mt-0.5" title="${link}">${link}</p></div></a>`;
        });
        html += `</div></div>`;
      }

      // Зображення / Скріншоти
      if (activeLesson.images && activeLesson.images.length > 0) {
        hasMaterials = true;
        html += `<div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-200"><h3 class="font-bold text-gray-900 mb-4 flex items-center gap-2"><i data-lucide="image" class="w-4 h-4 text-blue-500"></i> Скріншоти / Шпаргалки</h3><div class="grid grid-cols-2 gap-3">`;
        activeLesson.images.forEach((img, idx) => {
          html += `<a href="${img}" target="_blank" rel="noopener noreferrer" class="block rounded-lg overflow-hidden border border-gray-200 hover:opacity-80 transition-opacity bg-gray-100"><img src="${img}" alt="Матеріал ${idx + 1}" class="w-full h-24 object-cover" loading="lazy" /></a>`;
        });
        html += `</div></div>`;
      }

      if (!hasMaterials) {
        html += `<div class="bg-gray-50 rounded-2xl p-6 border border-gray-200 text-center text-gray-500"><p class="text-sm">Додаткові файли для цього уроку відсутні.</p></div>`;
      }
      
      html += `</div></div>`;

      // Пагінація
      let isFirst = true;
      let isLast = true;
      for(let i = 0; i < currentIndex; i++) if (!courseData[i].isModule) isFirst = false;
      for(let i = currentIndex + 1; i < courseData.length; i++) if (!courseData[i].isModule) isLast = false;

      html += `<div class="mt-12 flex items-center justify-between pt-6 border-t border-gray-200">
          <button onclick="goPrev()" ${isFirst ? 'disabled' : ''} class="px-5 py-2.5 rounded-xl font-medium transition-all ${isFirst ? 'text-gray-400 opacity-50 cursor-not-allowed' : 'text-gray-600 hover:bg-white hover:text-gray-900 border border-transparent hover:border-gray-200 hover:shadow-sm'}">← Попередній</button>
          <button onclick="goNext()" ${isLast ? 'disabled' : ''} class="px-5 py-2.5 rounded-xl font-semibold transition-all shadow-sm ${isLast ? 'bg-blue-300 text-white cursor-not-allowed' : 'bg-blue-600 text-white hover:bg-blue-700'}">Наступний крок →</button>
        </div>`;

      contentContainer.innerHTML = html;
    }

    function renderApp() { 
      renderSidebar(); 
      renderContent(); 
      lucide.createIcons(); 
    }
    
    document.addEventListener('DOMContentLoaded', () => { 
      renderApp(); 
    });
  </script>
</body>
</html>
