    // --- СТАН ДОДАТКУ ---
    let activeLessonId = 'home';

    let isSidebarOpen = false;

    let completedLessons = JSON.parse(localStorage.getItem('completedLessons')) || [];

    // --- ДОПОМІЖНІ ФУНКЦІЇ ---
    const getModules = () => {
      const modules = [];
      let currentModule = null;
      courseData.forEach(item => {
        if (item.isModule) {
          currentModule = { ...item, lessons: [] };
          modules.push(currentModule);
        } else if (currentModule) {
          currentModule.lessons.push(item);
        } else {
          currentModule = { id: 'intro', title: 'Вступні матеріали', isModule: true, description: [], lessons: [item] };
          modules.push(currentModule);
        }
      });
      return modules;
    };

    const getEmbedUrl = (url) => {
      if (!url) return null;
      const ytMatch = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i);
      if (ytMatch && ytMatch[1]) {
        return `https://www.youtube.com/embed/${ytMatch[1]}?rel=0`;
      }
      return url;
    };

    const isMp4 = (url) => url && url.toLowerCase().endsWith('.mp4');

    const getDomain = (url) => {
      try {
        const urlObj = new URL(url);
        return urlObj.hostname.replace('www.', '');
      } catch(e) {
        return "Посилання";
      }
    };

    function toggleLessonCompletion(id) {
      if (completedLessons.includes(id)) {
        completedLessons = completedLessons.filter(lessonId => lessonId !== id);
      } else {
        completedLessons.push(id);
      }
      localStorage.setItem('completedLessons', JSON.stringify(completedLessons));
      renderApp();
    }

    // --- ФУНКЦІЇ ВІДОБРАЖЕННЯ (РЕНДЕРУ) ---
    
    function toggleSidebar() {
      isSidebarOpen = !isSidebarOpen;
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      const menuIcon = document.getElementById('mobile-menu-icon');
      
      if (isSidebarOpen) {
        sidebar.classList.remove('-translate-x-full');
        overlay.classList.remove('hidden');
        menuIcon.setAttribute('data-lucide', 'x');
      } else {
        sidebar.classList.add('-translate-x-full');
        overlay.classList.add('hidden');
        menuIcon.setAttribute('data-lucide', 'menu');
      }
      lucide.createIcons();
    }

    function selectLesson(id) {
      if (id !== 'home') {
        lastActiveLessonId = id;
      }
      activeLessonId = id;
      currentVideoIndex = 0;
      if (isSidebarOpen) toggleSidebar();
      renderApp();
      document.querySelector('main').scrollTo({ top: 0, behavior: 'smooth' });
    }

    function selectVideo(index) {
      currentVideoIndex = index;
      renderApp(); // Перемальовуємо, щоб оновити відео та активну вкладку
    }

    function goPrev() {
      const currentIndex = courseData.findIndex(l => l.id === activeLessonId);
      if (currentIndex > 0) selectLesson(courseData[currentIndex - 1].id);
    }

    function goNext() {
      const currentIndex = courseData.findIndex(l => l.id === activeLessonId);
      if (currentIndex < courseData.length - 1) selectLesson(courseData[currentIndex + 1].id);
    }

    function renderSidebar() {
      const navContainer = document.getElementById('sidebar-nav');
      let html = '';

      // Кнопка Головної сторінки в сайдбарі
      const isHomeActive = activeLessonId === 'home';
      html += `
        <button onclick="selectLesson('home')" class="w-full text-left flex items-start gap-3 px-3 py-3 rounded-xl transition-all border mb-4 ${isHomeActive ? 'bg-blue-50 text-blue-700 shadow-sm border-blue-100' : 'text-gray-600 hover:bg-gray-100 hover:text-gray-900 border-transparent'}">

          </div>
          <span class="text-sm font-bold leading-snug">Головна сторінка</span>
        </button>
      `;

      courseData.forEach(item => {
        if (item.isModule) {
          html += `
            <div class="mt-6 mb-2 first:mt-2">
              <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider px-3">${item.title}</h3>
            </div>
          `;
        } else {
          const isActive = activeLessonId === item.id;
          const isCompleted = completedLessons.includes(item.id);
          const bgClass = isActive ? 'bg-blue-50 text-blue-700 shadow-sm border-blue-100' : 'text-gray-600 hover:bg-gray-100 hover:text-gray-900 border-transparent';
          
          let icon = 'circle';
          let iconClass = 'text-gray-300';
          
          if (isActive) {
            icon = 'play-circle';
            iconClass = 'text-blue-600';
          } else if (isCompleted) {
            icon = 'check-circle-2';
            iconClass = 'text-green-500';
          }
          
          html += `
            <button onclick="selectLesson(${item.id})" class="w-full text-left flex items-start gap-3 px-3 py-3 rounded-xl transition-all border ${bgClass}">
              <div class="mt-0.5 shrink-0">
                <i data-lucide="${icon}" class="w-[18px] h-[18px] ${iconClass}"></i>
              </div>
              <span class="text-sm font-medium leading-snug">${item.title}</span>
            </button>
          `;
        }
      });

      navContainer.innerHTML = html;
    }

      let html = `
        <!-- Хлібні крихти -->
        <div class="flex items-center text-sm text-gray-500 mb-6 font-medium">
          <button onclick="selectLesson('home')" class="hover:text-blue-600 flex items-center gap-1 transition-colors">
            <i data-lucide="home" class="w-4 h-4"></i> Головна
          </button>
          <i data-lucide="chevron-right" class="w-4 h-4 mx-2"></i>
          <span class="text-gray-900 truncate">Урок ${activeLesson.id}</span>
        </div>

        <!-- Заголовок уроку -->
        <h1 class="text-2xl md:text-4xl font-extrabold text-gray-900 mb-6 leading-tight">
          ${activeLesson.title}
        </h1>
      `;

      // ВІДЕОПЛЕЄР
      if (activeLesson.videos && activeLesson.videos.length > 0) {
        const currentVideo = activeLesson.videos[currentVideoIndex];
        
        html += `
          <div class="mb-8">
            <div class="aspect-video bg-black rounded-2xl overflow-hidden shadow-lg border border-gray-200 relative">
        `;
        
        if (isMp4(currentVideo)) {
          html += `<video controls class="w-full h-full object-contain" src="${currentVideo}" controlsList="nodownload">Ваш браузер не підтримує відео.</video>`;
        } else {
          html += `<iframe class="w-full h-full absolute top-0 left-0" src="${getEmbedUrl(currentVideo)}" title="Video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
        }
        
        html += `</div>`;

        // Вкладки для відео (якщо більше 1)
        if (activeLesson.videos.length > 1) {
          html += `
            <div class="mt-4 p-4 bg-white rounded-xl shadow-sm border border-gray-200">
              <h4 class="text-sm font-bold text-gray-700 mb-3 flex items-center gap-2">
                <i data-lucide="play-circle" class="w-4 h-4"></i> Частини уроку (${activeLesson.videos.length})
              </h4>
              <div class="flex flex-wrap gap-2">
          `;
          activeLesson.videos.forEach((_, idx) => {
            const btnClass = currentVideoIndex === idx ? 'bg-blue-600 text-white border-blue-600' : 'bg-gray-50 text-gray-600 hover:bg-gray-100 border-gray-200';
            html += `<button onclick="selectVideo(${idx})" class="px-4 py-2 text-sm font-semibold rounded-lg transition-colors border ${btnClass}">Частина ${idx + 1}</button>`;
          });
          html += `</div></div>`;
        }
        html += `</div>`;
      } else {
        // Якщо відео немає
        html += `
          <div class="aspect-video bg-gray-100 rounded-2xl flex flex-col items-center justify-center text-gray-400 mb-8 border-2 border-dashed border-gray-200">
            <i data-lucide="lock" class="w-12 h-12 mb-4 opacity-50"></i>
            <p class="font-medium">Відеоматеріали відсутні для цього розділу</p>
          </div>
        `;
      }

      // ОСНОВНА СІТКА (ОПИС ТА МАТЕРІАЛИ)
      html += `<div class="grid grid-cols-1 lg:grid-cols-3 gap-8">`;

      // ЛІВА КОЛОНКА: ОПИС
      html += `
        <div class="lg:col-span-2 space-y-8">
          <section class="bg-white rounded-2xl p-6 shadow-sm border border-gray-200">
            <h2 class="text-lg font-bold text-gray-900 mb-4 flex items-center gap-2">
              <i data-lucide="book-open" class="w-5 h-5 text-blue-500"></i> Що ви дізнаєтесь:
            </h2>
      `;
      
      if (activeLesson.description && activeLesson.description.length > 0) {
        html += `<ul class="space-y-3">`;
        activeLesson.description.forEach((item, idx) => {
          html += `
            <li class="flex items-start text-gray-700 leading-relaxed">
              <span class="h-6 w-6 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center shrink-0 mr-3 mt-0.5 text-xs font-bold">${idx + 1}</span>
              ${item}
            </li>
          `;
        });
        html += `</ul>`;
      } else {
        html += `<p class="text-gray-500 italic">Опис відсутній.</p>`;
      }
      html += `</section></div>`;

      // ПРАВА КОЛОНКА: МАТЕРІАЛИ
      html += `<div class="space-y-6">`;
      
      let hasMaterials = false;

      // Посилання
      if (activeLesson.links && activeLesson.links.length > 0) {
        hasMaterials = true;
        html += `
          <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-200">
            <h3 class="font-bold text-gray-900 mb-4 flex items-center gap-2">
              <i data-lucide="file-text" class="w-4 h-4 text-blue-500"></i> Додаткові матеріали
            </h3>
            <div class="space-y-3">
        `;
        activeLesson.links.forEach((link, idx) => {
          html += `
            <a href="${link}" target="_blank" rel="noopener noreferrer" class="group flex items-start gap-3 p-3 rounded-xl hover:bg-blue-50 border border-gray-100 hover:border-blue-100 transition-all">
              <div class="bg-gray-100 p-2 rounded-lg group-hover:bg-blue-100 group-hover:text-blue-600 transition-colors">
                <i data-lucide="link" class="w-4 h-4"></i>
              </div>
              <div class="overflow-hidden">
                <p class="text-sm font-semibold text-gray-800 group-hover:text-blue-700 truncate">${getDomain(link)}</p>
                <p class="text-xs text-gray-500 truncate mt-0.5">${link}</p>
              </div>
            </a>
          `;
        });
        html += `</div></div>`;
      }

      // Зображення
      if (activeLesson.images && activeLesson.images.length > 0) {
        hasMaterials = true;
        html += `
          <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-200">
            <h3 class="font-bold text-gray-900 mb-4 flex items-center gap-2">
              <i data-lucide="image" class="w-4 h-4 text-blue-500"></i> Скріншоти / Схеми
            </h3>
            <div class="grid grid-cols-2 gap-3">
        `;
        activeLesson.images.forEach((img, idx) => {
          html += `
            <a href="${img}" target="_blank" rel="noopener noreferrer" class="block rounded-lg overflow-hidden border border-gray-200 hover:opacity-80 transition-opacity">
              <img src="${img}" alt="Матеріал ${idx + 1}" class="w-full h-24 object-cover" />
            </a>
          `;
        });
        html += `</div></div>`;
      }

      // Заглушка, якщо матеріалів немає
      if (!hasMaterials) {
        html += `
          <div class="bg-gray-50 rounded-2xl p-6 border border-gray-200 text-center text-gray-500">
            <p class="text-sm">Додаткові файли для цього уроку відсутні.</p>
          </div>
        `;
      }
      
      html += `</div></div>`; // Закриваємо праву колонку і grid

      // Кнопка ПРОЙДЕНО
      const isCompleted = completedLessons.includes(activeLesson.id);
      html += `
        <div class="mt-10 flex justify-center">
          <button onclick="toggleLessonCompletion(${activeLesson.id})" class="flex items-center gap-2 px-6 py-3 rounded-xl font-bold transition-all border-2 ${isCompleted ? 'bg-green-50 border-green-500 text-green-700 hover:bg-green-100 shadow-sm' : 'bg-white border-gray-200 text-gray-600 hover:border-green-500 hover:text-green-600 hover:shadow-sm'}">
            <i data-lucide="${isCompleted ? 'check-circle-2' : 'circle'}" class="w-5 h-5"></i>
            ${isCompleted ? 'Урок пройдено' : 'Позначити як пройдений'}
          </button>
        </div>
      `;

      // НАВІГАЦІЯ
      const isFirst = currentIndex === 0;
      const isLast = currentIndex === courseData.length - 1;

      html += `
        <div class="mt-8 flex items-center justify-between pt-6 border-t border-gray-200">
          <button onclick="goPrev()" ${isFirst ? 'disabled' : ''} class="px-5 py-2.5 rounded-xl font-medium transition-all ${isFirst ? 'text-gray-400 opacity-50 cursor-not-allowed' : 'text-gray-600 hover:bg-white hover:text-gray-900 border border-transparent hover:border-gray-200 hover:shadow-sm'}">
            ← Попередній
          </button>
          
          <button onclick="goNext()" ${isLast ? 'disabled' : ''} class="px-5 py-2.5 rounded-xl font-semibold transition-all shadow-sm ${isLast ? 'bg-blue-300 text-white cursor-not-allowed' : 'bg-blue-600 text-white hover:bg-blue-700'}">
            Наступний крок →
          </button>
        </div>
      `;

      contentContainer.innerHTML = html;
    }

    // Головна функція ініціалізації
    function renderApp() {
      renderSidebar();
      renderContent();
      
      // Ініціалізуємо іконки Lucide після кожного оновлення DOM
      lucide.createIcons();
    }

    // Запуск після завантаження сторінки
    document.addEventListener('DOMContentLoaded', () => {
      renderApp();
    });

  </script>
</body>
</html>
