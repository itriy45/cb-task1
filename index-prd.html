            { id: 100, title: "100. Налаштування навчальної платформи KWIGA", isModule: false, description: ["Дізнаєшся, як упакувати свій інфопродукт на український навчальній платформі Kwiga"], videos: ["https://media.kwigacdn.com/key=+vVebI+5Pl+pX-7Nb14XGA,end=1774299904/media=hlsA/multi=1920x1080:1080p,640x360:360p/cabinet-610/vICqte8AbF2M/nalastuvannia_plotformi_s__TPL_.mp4"], links: ["https://kwiga.com/ua?utmla=4472fba0e6700105e7faf5e29634e666"], images: ["https://cdn-files.kwigacdn.com/cabinet-610/Jmn8Wceqx5ve/zastavkamb_2.jpg"] }
        ];

        // Process data to build hierarchy
        const modules = [];
        let currentModule = null;
        let totalLessons = 0;

        courseData.forEach(item => {
            if(item.isModule) {
                currentModule = { ...item, lessons: [] };
                modules.push(currentModule);
            } else {
                totalLessons++;
                if (currentModule) {
                    currentModule.lessons.push(item);
                } else {
                    currentModule = { id: 0, title: "General", isModule: true, lessons: [item] };
                    modules.push(currentModule);
                }
            }
        });

        // ---------------------------------------------------
        // STATE MANAGEMENT
        // ---------------------------------------------------
        const STORAGE_KEY = 'moneyblog_completed_lessons';
        const LAST_LESSON_KEY = 'moneyblog_last_lesson';
        
        let completedLessons = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
        let currentView = 'home'; // 'home' or lesson ID
        let lastActiveLessonId = localStorage.getItem(LAST_LESSON_KEY) ? parseInt(localStorage.getItem(LAST_LESSON_KEY)) : null;

        // ---------------------------------------------------
        // UI FUNCTIONS
        // ---------------------------------------------------
        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify([...completedLessons]));
            if (lastActiveLessonId) {
                localStorage.setItem(LAST_LESSON_KEY, lastActiveLessonId);
            }
            updateProgress();
        }

        function updateProgress() {
            const pct = totalLessons > 0 ? Math.round((completedLessons.size / totalLessons) * 100) : 0;
            document.getElementById('progress-text').innerText = `${pct}%`;
            document.getElementById('progress-bar').style.width = `${pct}%`;
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        function navigate(target) {
            currentView = target;
            if (target !== 'home') {
                lastActiveLessonId = target;
                saveState();
            }
            renderApp();
            if (window.innerWidth < 1024) {
                document.getElementById('sidebar').classList.add('-translate-x-full');
                document.getElementById('mobile-overlay').classList.add('hidden');
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleLessonCompleted(id) {
            if (completedLessons.has(id)) {
                completedLessons.delete(id);
            } else {
                completedLessons.add(id);
            }
            saveState();
            renderApp();
        }

        // ---------------------------------------------------
        // RENDER FUNCTIONS
        // ---------------------------------------------------
        function renderSidebar() {
            const nav = document.getElementById('sidebar-nav');
            let html = '';

            modules.forEach(mod => {
                html += `<div class="mt-4 mb-1 px-3">
                            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider">${mod.title}</h3>
                         </div>`;
                
                mod.lessons.forEach(lesson => {
                    const isCompleted = completedLessons.has(lesson.id);
                    const isActive = currentView === lesson.id;
                    
                    html += `
                        <button onclick="navigate(${lesson.id})" class="sidebar-item w-full text-left flex items-start gap-3 px-3 py-2.5 rounded-lg transition-colors ${isActive ? 'active' : 'text-gray-600 hover:bg-gray-100'}">
                            <div class="mt-0.5 flex-shrink-0">
                                ${isCompleted 
                                    ? '<i data-lucide="check-circle-2" class="w-5 h-5 text-green-500"></i>' 
                                    : '<i data-lucide="circle" class="w-5 h-5 text-gray-300"></i>'}
                            </div>
                            <span class="text-sm line-clamp-2 leading-tight">${lesson.title}</span>
                        </button>
                    `;
                });
            });

            nav.innerHTML = html;
        }

        function renderDashboard() {
            document.getElementById('header-title').innerText = 'Дашборд програми';
            const container = document.getElementById('main-content');
            
            // Determine which module to open by default
            let activeModuleId = null;
            if (lastActiveLessonId) {
                const activeMod = modules.find(m => m.lessons.some(l => l.id === lastActiveLessonId));
                if (activeMod) activeModuleId = activeMod.id;
            }

            let html = `
                <div class="max-w-4xl mx-auto fade-in">
                    <div class="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-2xl p-8 text-white mb-8 shadow-lg">
                        <h1 class="text-3xl font-bold mb-2">Привіт! 👋</h1>
                        <p class="text-blue-100 mb-6">Продовжуй навчання. Твій поточний прогрес:</p>
                        <div class="flex items-center gap-4">
                            <div class="flex-1 bg-white/20 rounded-full h-3">
                                <div class="bg-white h-3 rounded-full" style="width: ${(completedLessons.size / totalLessons) * 100}%"></div>
                            </div>
                            <span class="font-bold">${completedLessons.size} / ${totalLessons} уроків</span>
                        </div>
                    </div>

                    <h2 class="text-xl font-bold text-gray-800 mb-6">Програма курсу</h2>
                    <div class="space-y-4">
            `;

            modules.forEach((mod, index) => {
                const modCompleted = mod.lessons.filter(l => completedLessons.has(l.id)).length;
                const isOpen = activeModuleId === mod.id || (!activeModuleId && index === 0) ? 'open' : '';
                
                html += `
                    <details class="bg-white border border-gray-200 rounded-2xl shadow-sm overflow-hidden group" ${isOpen}>
                        <summary class="flex items-center justify-between p-5 cursor-pointer hover:bg-gray-50 transition-colors">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold">
                                    ${index + 1}
                                </div>
                                <div>
                                    <h3 class="font-bold text-gray-800">${mod.title}</h3>
                                    <p class="text-sm text-gray-500">${modCompleted} / ${mod.lessons.length} пройдено</p>
                                </div>
                            </div>
                            <i data-lucide="chevron-down" class="w-5 h-5 text-gray-400 group-open:rotate-180 transition-transform"></i>
                        </summary>
                        <div class="px-5 pb-5 pt-2 border-t border-gray-100">
                            <div class="space-y-2">
                `;

                mod.lessons.forEach(lesson => {
                    const isCompleted = completedLessons.has(lesson.id);
                    html += `
                        <button onclick="navigate(${lesson.id})" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-gray-50 transition-colors text-left border border-transparent hover:border-gray-200">
                            ${isCompleted 
                                ? '<i data-lucide="check-circle-2" class="w-5 h-5 text-green-500 flex-shrink-0"></i>' 
                                : '<i data-lucide="play-circle" class="w-5 h-5 text-blue-500 flex-shrink-0"></i>'}
                            <span class="font-medium text-gray-700 flex-1">${lesson.title}</span>
                            <i data-lucide="chevron-right" class="w-4 h-4 text-gray-300"></i>
                        </button>
                    `;
                });

                html += `</div></div></details>`;
            });

            html += `</div></div>`;
            container.innerHTML = html;
        }

        // Expose global function for inline HTML calls (video tabs)
        window.switchVideo = function(index) {
            const videoEl = document.getElementById('main-video-player');
            if(videoEl && window.currentLessonVideos) {
                videoEl.src = window.currentLessonVideos[index];
                
                // Update tab styles
                document.querySelectorAll('.video-tab').forEach((tab, i) => {
                    if(i === index) {
                        tab.classList.replace('bg-gray-200', 'bg-blue-600');
                        tab.classList.replace('text-gray-700', 'text-white');
                    } else {
                        tab.classList.replace('bg-blue-600', 'bg-gray-200');
                        tab.classList.replace('text-white', 'text-gray-700');
                    }
                });
            }
        };

        function renderLesson(id) {
            const lesson = courseData.find(l => l.id === id);
            if (!lesson) return navigate('home');

            // Find context for prev/next buttons
            let prevId = null, nextId = null;
            const allLessons = courseData.filter(i => !i.isModule);
            const currentIndex = allLessons.findIndex(l => l.id === id);
            if(currentIndex > 0) prevId = allLessons[currentIndex - 1].id;
            if(currentIndex < allLessons.length - 1) nextId = allLessons[currentIndex + 1].id;

            document.getElementById('header-title').innerText = lesson.title;
            const container = document.getElementById('main-content');
            
            // Store videos globally for the tab switcher
            window.currentLessonVideos = lesson.videos;

            let html = `<div class="max-w-4xl mx-auto pb-20 fade-in">`;
            
            // Title
            html += `<h1 class="text-2xl md:text-3xl font-bold text-gray-900 mb-6">${lesson.title}</h1>`;

            // Videos
            if (lesson.videos && lesson.videos.length > 0) {
                html += `<div class="mb-8">`;
                if (lesson.videos.length > 1) {
                    html += `<div class="flex flex-wrap gap-2 mb-3">`;
                    lesson.videos.forEach((v, i) => {
                        html += `<button onclick="switchVideo(${i})" class="video-tab px-4 py-2 text-sm font-medium rounded-lg transition-colors ${i === 0 ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}">Частина ${i+1}</button>`;
                    });
                    html += `</div>`;
                }
                
                html += `
                    <div class="relative rounded-2xl overflow-hidden bg-black aspect-video shadow-md">
                        <video id="main-video-player" controls class="w-full h-full object-contain" src="${lesson.videos[0]}"></video>
                    </div>
                </div>`;
            }

            // Description
            if (lesson.description && lesson.description.length > 0) {
                html += `<div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 mb-8 prose max-w-none text-gray-700">`;
                lesson.description.forEach(p => {
                    html += `<p class="whitespace-pre-wrap mb-4 last:mb-0">${p}</p>`;
                });
                html += `</div>`;
            }

            // Links / Materials
            if (lesson.links && lesson.links.length > 0) {
                html += `
                    <div class="mb-8">
                        <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                            <i data-lucide="paperclip" class="w-5 h-5 text-gray-400"></i> Матеріали та посилання
                        </h3>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                `;
                lesson.links.forEach(url => {
                    try {
                        const urlObj = new URL(url);
                        const isDoc = url.toLowerCase().includes('.pdf') || url.toLowerCase().includes('docs.google.com');
                        const icon = isDoc ? 'file-text' : 'external-link';
                        html += `
                            <a href="${url}" target="_blank" class="flex items-center gap-3 p-4 bg-white border border-gray-200 rounded-xl hover:border-blue-500 hover:shadow-md transition-all group">
                                <div class="bg-gray-50 p-2 rounded-lg group-hover:bg-blue-50 transition-colors">
                                    <i data-lucide="${icon}" class="w-5 h-5 text-blue-600"></i>
                                </div>
                                <span class="truncate flex-1 text-sm font-medium text-gray-700 group-hover:text-blue-600">${urlObj.hostname.replace('www.','')}</span>
                            </a>
                        `;
                    } catch(e) { /* Ignore bad URLs */ }
                });
                html += `</div></div>`;
            }

            // Images
            // Filter out the repetitive avatar/thumbnails to make UI cleaner if wanted, but instructions said to include images. 
            // I'll filter the 3 repetitive ones to avoid clutter if there are more than just those 3, or if they are the only ones.
            const spamImages = ["144.jpeg", "img_9266.jpg", "1111111.jpeg"];
            const uniqueImages = lesson.images ? lesson.images.filter(img => !spamImages.some(spam => img.includes(spam))) : [];
            
            if (uniqueImages.length > 0) {
                html += `
                    <div class="mb-8">
                        <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                            <i data-lucide="image" class="w-5 h-5 text-gray-400"></i> Зображення до уроку
                        </h3>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                `;
                uniqueImages.forEach(img => {
                    html += `
                        <a href="${img}" target="_blank" class="block aspect-square rounded-xl overflow-hidden border border-gray-200 bg-gray-50 hover:opacity-90 transition-opacity">
                            <img src="${img}" alt="Зображення уроку" class="w-full h-full object-cover">
                        </a>
                    `;
                });
                html += `</div></div>`;
            }

            // Completion Toggle & Navigation Footer
            const isCompleted = completedLessons.has(lesson.id);
            html += `
                <div class="mt-12 pt-6 border-t border-gray-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                    <button onclick="navigate(${prevId || "'home'"})" class="w-full sm:w-auto px-5 py-2.5 rounded-xl border border-gray-300 text-gray-700 font-medium hover:bg-gray-50 transition-colors flex items-center justify-center gap-2 ${!prevId ? 'opacity-50 cursor-not-allowed pointer-events-none' : ''}">
                        <i data-lucide="arrow-left" class="w-4 h-4"></i> Попередній
                    </button>
                    
                    <button onclick="toggleLessonCompleted(${lesson.id})" class="w-full sm:w-auto px-6 py-2.5 rounded-xl font-bold transition-all flex items-center justify-center gap-2 ${isCompleted ? 'bg-green-100 text-green-700 border border-green-200 hover:bg-green-200' : 'bg-blue-600 text-white hover:bg-blue-700'}">
                        <i data-lucide="check" class="w-5 h-5"></i> 
                        ${isCompleted ? 'Урок пройдено' : 'Відмітити як пройдений'}
                    </button>

                    <button onclick="navigate(${nextId || "'home'"})" class="w-full sm:w-auto px-5 py-2.5 rounded-xl border border-gray-300 text-gray-700 font-medium hover:bg-gray-50 transition-colors flex items-center justify-center gap-2 ${!nextId ? 'opacity-50 cursor-not-allowed pointer-events-none' : ''}">
                        Наступний <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </button>
                </div>
            `;

            html += `</div>`;
            container.innerHTML = html;
        }

        function renderApp() {
            updateProgress();
            renderSidebar();
            if (currentView === 'home') {
                renderDashboard();
            } else {
                renderLesson(parseInt(currentView));
            }
            lucide.createIcons();
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            renderApp();
        });
    </script>
</body>
</html>
